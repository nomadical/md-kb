# Fly.io config for the md-kb demo. Rename `app` and set a region, then:
#   fly launch --no-deploy            # (or `fly apps create <name>`)
#   fly deploy \
#     --build-arg VITE_SUPABASE_URL=https://YOUR.supabase.co \
#     --build-arg VITE_SUPABASE_ANON_KEY=YOUR_ANON_KEY \
#     --build-arg VITE_SITE_URL=https://YOUR-APP.fly.dev
#   fly secrets set SUPABASE_SERVICE_ROLE_KEY=...   # server-only
# See docs/DEPLOY.md for the full walkthrough.
app = "md-kb-demo"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"