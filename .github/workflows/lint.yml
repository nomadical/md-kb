name: Lint

# Runs oxlint (with GitHub annotations) + a TypeScript typecheck on every PR
# and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: oxlint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: oxlint
        run: npx oxlint --format=github
      - name: typecheck
        # Build the workspace packages first so tsc can resolve @skycell-ag/kb-core
        # (its types come from packages/kb-core/dist). Without this, tsc reports
        # "Cannot find module '@skycell-ag/kb-core'".
        run: npm run build:packages && npx tsc --noEmit
