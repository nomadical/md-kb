name: CI

# Lint + typecheck + tests on every PR and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      # Build the workspace packages first so tsc/vitest resolve @md-kb/core
      # (its types/build come from packages/kb-core/dist).
      - run: npm run build:packages
      - name: oxlint
        run: npx oxlint --format=github
      - name: typecheck
        run: npx tsc --noEmit
      - name: test
        run: npm test